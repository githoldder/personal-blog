<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Obsidian Canvas High-Fidelity Viewer</title>
  <style>
    html, body, #app {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
      cursor: grab;
      user-select: none;
      overflow: hidden;
    }
    .canvas-container:active {
      cursor: grabbing;
    }
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(148, 163, 184, 0.16) 1.5px, transparent 1.5px);
      background-size: 20px 20px;
      pointer-events: none;
    }
    .canvas-viewport {
      position: absolute;
      transform-origin: 0 0;
      width: 1px;
      height: 1px;
      overflow: visible;
    }
    .canvas-svg {
      position: absolute;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      overflow: visible;
      pointer-events: none;
      z-index: 4;
    }
    .canvas-edge {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.75));
    }
    .canvas-edge-label {
      position: absolute;
      z-index: 8;
      transform: translate(-50%, -50%);
      padding: 3px 8px;
      border: 1px solid rgba(203, 213, 225, 0.88);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: #334155;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
      pointer-events: none;
    }
    .canvas-node {
      position: absolute;
      box-sizing: border-box;
      border: 1.6px solid rgba(203, 213, 225, 0.95);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      color: #1e293b;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08), 0 2px 5px rgba(15, 23, 42, 0.05);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }
    .canvas-node.file {
      border-width: 2px;
    }
    .canvas-node.text {
      border-style: solid;
    }
    .canvas-node.group {
      z-index: 1;
      border-style: dashed;
      border-width: 2px;
      background: rgba(226, 232, 240, 0.22);
      box-shadow: none;
      overflow: visible;
    }
    .canvas-node-content {
      padding: 12px 14px;
      font-size: 13px;
      color: #334155;
      line-height: 1.55;
      overflow: auto;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      flex: 1;
    }
    .canvas-node-content strong {
      color: #0f172a;
      font-weight: 800;
    }
    .canvas-node-content h1,
    .canvas-node-content h2,
    .canvas-node-content h3 {
      margin: 0 0 6px;
      color: #0f172a;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.12;
    }
    .canvas-node-content h1 { font-size: 22px; }
    .canvas-node-content h2 { font-size: 19px; }
    .canvas-node-content h3 { font-size: 16px; }
    .canvas-node-content ul {
      margin: 4px 0 0 18px;
      padding: 0;
    }
    .canvas-node-content li {
      margin: 2px 0;
    }
    .canvas-group-label {
      position: absolute;
      top: -30px;
      left: 12px;
      max-width: calc(100% - 24px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 5px 10px;
      border-radius: 999px;
      color: #0f172a;
      font-size: 13px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    }
    .canvas-controls {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      gap: 2px;
      overflow: hidden;
      border: 1px solid rgba(203, 213, 225, 0.86);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.1);
      backdrop-filter: blur(8px);
    }
    .canvas-controls button,
    .canvas-controls span {
      border: 0;
      background: transparent;
      color: #334155;
      font: 700 13px/1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      height: 36px;
      min-width: 42px;
      padding: 0 12px;
    }
    .canvas-controls button {
      cursor: pointer;
    }
    .canvas-controls button:hover {
      background: rgba(241, 245, 249, 0.9);
      color: #be123c;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 13px;
      color: #64748b;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="app">
    <div class="loading">正在加载画布引擎...</div>
  </div>

  <script>
    const OBSIDIAN_COLOR_MAP = {
      '1': '#e93147',
      '2': '#ec7500',
      '3': '#e0ac00',
      '4': '#08b94e',
      '5': '#00bfbc',
      '6': '#7852ee'
    };

    const colorFor = (value, fallback = '#64748b') => {
      if (!value) return fallback;
      return OBSIDIAN_COLOR_MAP[value] || value;
    };

    const hexToRgb = (hex) => {
      const normalized = hex.replace('#', '').trim();
      if (normalized.length !== 6) return { r: 100, g: 116, b: 139 };
      return {
        r: parseInt(normalized.slice(0, 2), 16),
        g: parseInt(normalized.slice(2, 4), 16),
        b: parseInt(normalized.slice(4, 6), 16)
      };
    };

    const withAlpha = (color, alpha) => {
      const resolved = colorFor(color);
      if (!resolved.startsWith('#')) return resolved;
      const { r, g, b } = hexToRgb(resolved);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    };

    const getNodePoint = (node, side) => {
      const normalized = side || 'right';
      const midX = node.x + node.width / 2;
      const midY = node.y + node.height / 2;
      if (normalized === 'left') return { x: node.x, y: midY };
      if (normalized === 'right') return { x: node.x + node.width, y: midY };
      if (normalized === 'top') return { x: midX, y: node.y };
      if (normalized === 'bottom') return { x: midX, y: node.y + node.height };
      return { x: midX, y: midY };
    };

    const sideVector = (side) => {
      if (side === 'left') return { x: -1, y: 0 };
      if (side === 'right') return { x: 1, y: 0 };
      if (side === 'top') return { x: 0, y: -1 };
      if (side === 'bottom') return { x: 0, y: 1 };
      return { x: 1, y: 0 };
    };

    const renderEdgePath = (edge, nodesById) => {
      const fromNode = nodesById.get(edge.fromNode);
      const toNode = nodesById.get(edge.toNode);
      if (!fromNode || !toNode) return null;

      const start = getNodePoint(fromNode, edge.fromSide);
      const end = getNodePoint(toNode, edge.toSide);
      const startVector = sideVector(edge.fromSide);
      const endVector = sideVector(edge.toSide);
      const distance = Math.hypot(end.x - start.x, end.y - start.y);
      const handle = Math.max(80, Math.min(280, distance * 0.38));
      const c1 = {
        x: start.x + startVector.x * handle,
        y: start.y + startVector.y * handle
      };
      const c2 = {
        x: end.x + endVector.x * handle,
        y: end.y + endVector.y * handle
      };
      return {
        d: `M ${start.x} ${start.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${end.x} ${end.y}`,
        labelX: (start.x + end.x) / 2,
        labelY: (start.y + end.y) / 2
      };
    };

    const boundsFor = (nodes) => {
      if (!nodes.length) return { minX: -600, minY: -360, maxX: 600, maxY: 360 };
      return nodes.reduce((acc, node) => ({
        minX: Math.min(acc.minX, node.x),
        minY: Math.min(acc.minY, node.y),
        maxX: Math.max(acc.maxX, node.x + node.width),
        maxY: Math.max(acc.maxY, node.y + node.height)
      }), { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity });
    };

    const fitZoom = (nodes, container) => {
      const bounds = boundsFor(nodes);
      const padding = 96;
      const width = Math.max(1, bounds.maxX - bounds.minX);
      const height = Math.max(1, bounds.maxY - bounds.minY);
      const k = Math.max(0.12, Math.min(1.15, Math.min(
        (container.clientWidth - padding) / width,
        (container.clientHeight - padding) / height
      )));
      return {
        k,
        x: (container.clientWidth - width * k) / 2 - bounds.minX * k,
        y: (container.clientHeight - height * k) / 2 - bounds.minY * k
      };
    };

    const formatFileName = (file) => {
      if (!file) return '关联文档';
      return file.split('/').pop().replace(/\.md$/i, '');
    };

    const renderMarkdownish = (text) => {
      const source = text || '';
      const lines = source.split('\n');
      return lines.map((line, index) => {
        const heading = line.match(/^(#{1,3})\s+(.*)$/);
        if (heading) {
          const tag = `h${heading[1].length}`;
          return React.createElement(tag, { key: index }, heading[2]);
        }
        const bullet = line.match(/^\s*[-*]\s+(.*)$/);
        if (bullet) {
          return React.createElement('div', { key: index }, `• ${bullet[1]}`);
        }
        const boldParts = line.split(/(\*\*[^*]+\*\*)/g).map((part, partIndex) => {
          if (part.startsWith('**') && part.endsWith('**')) {
            return React.createElement('strong', { key: partIndex }, part.slice(2, -2));
          }
          return part;
        });
        return React.createElement('div', { key: index }, boldParts);
      });
    };

    const App = () => {
      const [data, setData] = React.useState(null);
      const [zoom, setZoom] = React.useState({ x: 80, y: 80, k: 1 });
      const containerRef = React.useRef(null);
      const isDraggingRef = React.useRef(false);
      const dragStartRef = React.useRef({ x: 0, y: 0 });

      React.useEffect(() => {
        const handleMessage = (event) => {
          if (event.data && event.data.type === 'CANVAS_DATA') {
            try {
              const payload = typeof event.data.payload === 'string'
                ? JSON.parse(event.data.payload)
                : event.data.payload;
              setData(payload);
            } catch (err) {
              console.error('Failed to parse Canvas data:', err);
            }
          }
        };
        window.addEventListener('message', handleMessage);
        window.parent.postMessage({ type: 'CANVAS_VIEWER_READY' }, '*');
        return () => window.removeEventListener('message', handleMessage);
      }, []);

      React.useEffect(() => {
        if (!data || !containerRef.current) return;
        setZoom(fitZoom(data.nodes || [], containerRef.current));
      }, [data]);

      const handleWheel = (e) => {
        e.preventDefault();
        const rect = containerRef.current.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const nextK = Math.max(0.08, Math.min(3.5, zoom.k - e.deltaY * 0.00055 * zoom.k));
        setZoom({
          x: mouseX - (mouseX - zoom.x) * (nextK / zoom.k),
          y: mouseY - (mouseY - zoom.y) * (nextK / zoom.k),
          k: nextK
        });
      };

      const handlePointerDown = (e) => {
        if (e.target.closest('.canvas-controls')) return;
        isDraggingRef.current = true;
        dragStartRef.current = { x: e.clientX - zoom.x, y: e.clientY - zoom.y };
        containerRef.current.setPointerCapture(e.pointerId);
      };

      const handlePointerMove = (e) => {
        if (!isDraggingRef.current) return;
        setZoom(prev => ({
          ...prev,
          x: e.clientX - dragStartRef.current.x,
          y: e.clientY - dragStartRef.current.y
        }));
      };

      const handlePointerUp = () => {
        isDraggingRef.current = false;
      };

      if (!data) {
        return React.createElement('div', { className: 'loading' }, '正在接收画布数据并渲染...');
      }

      const nodes = data.nodes || [];
      const edges = data.edges || [];
      const nodesById = new Map(nodes.map(node => [node.id, node]));

      const zoomBy = (factor) => {
        const rect = containerRef.current.getBoundingClientRect();
        const cx = rect.width / 2;
        const cy = rect.height / 2;
        const nextK = Math.max(0.08, Math.min(3.5, zoom.k * factor));
        setZoom({
          x: cx - (cx - zoom.x) * (nextK / zoom.k),
          y: cy - (cy - zoom.y) * (nextK / zoom.k),
          k: nextK
        });
      };

      return React.createElement(
        'div',
        {
          ref: containerRef,
          className: 'canvas-container',
          onWheel: handleWheel,
          onPointerDown: handlePointerDown,
          onPointerMove: handlePointerMove,
          onPointerUp: handlePointerUp,
          onPointerLeave: handlePointerUp,
          style: { touchAction: 'none' }
        },
        React.createElement('div', { className: 'grid-bg' }),
        React.createElement(
          'div',
          {
            className: 'canvas-viewport',
            style: { transform: `translate(${zoom.x}px, ${zoom.y}px) scale(${zoom.k})` }
          },
          React.createElement(
            'svg',
            { className: 'canvas-svg' },
            React.createElement(
              'defs',
              null,
              edges.map(edge => {
                const edgeColor = colorFor(edge.color, '#94a3b8');
                return React.createElement('marker', {
                  key: `arrow-to-${edge.id}`,
                  id: `arrow-to-${edge.id}`,
                  viewBox: '0 0 10 10',
                  refX: '8.5',
                  refY: '5',
                  markerWidth: '7',
                  markerHeight: '7',
                  orient: 'auto-start-reverse'
                }, React.createElement('path', { d: 'M 0 1.2 L 10 5 L 0 8.8 z', fill: edgeColor }));
              }),
              edges.map(edge => {
                const edgeColor = colorFor(edge.color, '#94a3b8');
                return React.createElement('marker', {
                  key: `arrow-from-${edge.id}`,
                  id: `arrow-from-${edge.id}`,
                  viewBox: '0 0 10 10',
                  refX: '1.5',
                  refY: '5',
                  markerWidth: '7',
                  markerHeight: '7',
                  orient: 'auto-start-reverse'
                }, React.createElement('path', { d: 'M 10 1.2 L 0 5 L 10 8.8 z', fill: edgeColor }));
              })
            ),
            edges.map(edge => {
              const path = renderEdgePath(edge, nodesById);
              if (!path) return null;
              const edgeColor = colorFor(edge.color, '#94a3b8');
              return React.createElement('path', {
                key: edge.id,
                className: 'canvas-edge',
                d: path.d,
                stroke: edgeColor,
                strokeWidth: edge.width || 2.4,
                strokeDasharray: edge.style === 'dashed' ? '10 8' : undefined,
                markerStart: edge.fromEnd === 'arrow' ? `url(#arrow-from-${edge.id})` : undefined,
                markerEnd: edge.toEnd === 'none' ? undefined : `url(#arrow-to-${edge.id})`
              });
            })
          ),
          edges.map(edge => {
            if (!edge.label) return null;
            const path = renderEdgePath(edge, nodesById);
            if (!path) return null;
            return React.createElement('div', {
              key: `label-${edge.id}`,
              className: 'canvas-edge-label',
              style: { left: `${path.labelX}px`, top: `${path.labelY}px` }
            }, edge.label);
          }),
          nodes.map(node => {
            const isGroup = node.type === 'group';
            const nodeColor = colorFor(node.borderColor || node.color, '#cbd5e1');
            const background = node.backgroundColor || withAlpha(node.color || node.borderColor || '#cbd5e1', isGroup ? 0.1 : 0.08);
            const style = {
              left: `${node.x}px`,
              top: `${node.y}px`,
              width: `${node.width}px`,
              height: `${node.height}px`,
              borderColor: nodeColor,
              background
            };

            if (isGroup) {
              return React.createElement(
                'div',
                { key: node.id, className: 'canvas-node group', style },
                node.label && React.createElement('div', {
                  className: 'canvas-group-label',
                  style: { border: `1px solid ${withAlpha(nodeColor, 0.28)}` }
                }, node.label)
              );
            }

            const isFile = node.type === 'file';
            return React.createElement(
              'div',
              { key: node.id, className: `canvas-node ${node.type || 'text'}`, style },
              React.createElement(
                'div',
                { className: 'canvas-node-content' },
                isFile
                  ? React.createElement(React.Fragment, null,
                      React.createElement('strong', null, formatFileName(node.file)),
                      node.file && React.createElement('div', { style: { marginTop: '6px', color: '#64748b', fontSize: '11px' } }, node.file)
                    )
                  : renderMarkdownish(node.text || node.label || '')
              )
            );
          })
        ),
        React.createElement(
          'div',
          { className: 'canvas-controls' },
          React.createElement('button', { type: 'button', onClick: () => zoomBy(0.82), title: '缩小' }, '-'),
          React.createElement('span', null, `${Math.round(zoom.k * 100)}%`),
          React.createElement('button', { type: 'button', onClick: () => zoomBy(1.18), title: '放大' }, '+'),
          React.createElement('button', { type: 'button', onClick: () => setZoom(fitZoom(nodes, containerRef.current)), title: '适配画布' }, 'fit')
        )
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
